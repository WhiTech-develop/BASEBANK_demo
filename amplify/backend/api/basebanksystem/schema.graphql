type Deal @model @auth(rules: [{allow: public}]) {
  id: ID!
  staff_name: String
  venue_id: String
  venueLabel: String
  customer: String
  status: String # 登録中 / 査定待ち / 交渉中 / 成約 / 不成約
  total_buy_price: Int
  hqAnswer: String # 本部からの査定回答（JSON形式）
  items: [Item] @hasMany(indexName: "byDeal", fields: ["id"])
  messages: [Message] @hasMany(indexName: "byDeal", fields: ["id"])
  createdAt: AWSDateTime
}

type Item @model @auth(rules: [{allow: public}]) {
  id: ID!
  dealID: ID! @index(name: "byDeal")
  category: String
  itemName: String
  weight: Float
  buy_price: Int
  condition: String
}

type Message @model @auth(rules: [{allow: public}]) {
  id: ID!
  dealID: ID! @index(name: "byDeal")
  sender_role: String # field / hq
  text: String
  sent_at: AWSDateTime
}
