<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>本部ダッシュボード | BASEBANK</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/hq.css">
  
  <script src="js/lib.js"></script>
  <script src="aws-exports.js"></script>
  
  <script>
    (function() {
      const raw = window.Amplify || window['aws-amplify'] || window.aws_amplify;
      if (raw) { window.Amplify = raw.Amplify || raw.default || raw; }
    })();

    if (window.Amplify && window.awsmobile) {
      window.Amplify.configure(window.awsmobile);
      window.AWS_READY = true;
      console.log("✅ HQ: AWS Amplify Configured");
    }
  </script>
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block !important; }
    .queue-card { transition: 0.2s; border-left: 4px solid transparent; }
    .queue-card:hover { background: #f1f5f9; }
    .queue-card.selected { background: #eff6ff !important; border-left: 4px solid #2563eb !important; }
  </style>
</head>
<body>
<div id="hq-app">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand-name">BASEBANK 本部</div></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="dashboard" onclick="showTab('dashboard')">ダッシュボード</button>
      <button class="nav-item" data-tab="assessment" onclick="showTab('assessment')">
        査定コンソール <span id="queue-badge" class="nav-badge">0</span>
      </button>
    </nav>
  </aside>

  <div class="main-content">
    <div class="topbar"><div class="topbar-title">リアルタイム管理画面</div></div>

    <div id="tab-dashboard" class="tab-content active">
      <div class="kpi-row" style="display:flex; gap:20px; padding:20px;">
        <div class="kpi-hq" style="background:#fff; padding:20px; border-radius:12px; flex:1; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);">
          <div style="color:#64748b; font-size:14px; font-weight:500;">未対応の査定依頼</div>
          <div id="kpi-pending-count" style="font-size:36px; font-weight:800; color:#ef4444; margin-top:8px;">0</div>
        </div>
        <div class="kpi-hq" style="background:#fff; padding:20px; border-radius:12px; flex:1; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);">
          <div style="color:#64748b; font-size:14px; font-weight:500;">本日の粗利目標</div>
          <div style="font-size:36px; font-weight:800; color:#3b82f6; margin-top:8px;">¥128,000</div>
        </div>
      </div>
    </div>

    <div id="tab-assessment" class="tab-content">
      <div class="assessment-layout" style="display:flex; gap:20px; padding:20px; height:calc(100vh - 120px);">
        <div style="width:350px; background:#fff; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1);">
            <div style="padding:16px; border-bottom:1px solid #e2e8f0; font-weight:700; background:#f8fafc; border-radius:12px 12px 0 0;">査定待ちリスト</div>
            <div id="queue-list" style="flex:1; overflow-y:auto;">
                <div style="padding:24px; text-align:center; color:#94a3b8;">依頼をロード中...</div>
            </div>
        </div>
        <div id="assess-panel" style="flex:1; background:#fff; border-radius:12px; padding:32px; border:1px solid #e2e8f0; box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1);">
            <div style="text-align:center; padding-top:120px; color:#94a3b8;">
                <i class="fa-solid fa-magnifying-glass-chart" style="font-size:56px; margin-bottom:24px; color:#cbd5e1;"></i>
                <p style="font-size:18px;">左のリストから案件を選択してください</p>
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/mockdata.js"></script>
<script src="js/hq.js"></script>
</body>
</html>
