<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>現場バイヤーアプリ | BASEBANK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/field.css">

  <script src="js/aws-amplify.min.js"></script>
<script src="aws-exports.js"></script>
<script>
  window.onload = function() {
    // ローカルから読み込んだ Amplify を初期化
    const amp = window.Amplify || window['aws-amplify'];
    if (amp && window.awsmobile) {
      amp.configure(window.awsmobile);
      console.log("Local Amplify loaded and configured.");
    }
  };
</script>
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>
<div id="field-app">

  <nav class="app-nav" id="main-nav">
    <div class="nav-logo">
      <div class="nav-logo-icon"><i class="fa-solid fa-gem"></i></div>
      <span>BASEBANK 現場</span>
    </div>
    <button class="nav-logout hidden" id="nav-logout" onclick="doLogout()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </nav>

  <div class="screen" id="screen-0">
    <div style="text-align:center;padding:var(--space-xl) 0 var(--space-lg)">
      <div style="width:64px;height:64px;background:var(--accent-blue);border-radius:var(--radius-xl);display:inline-flex;align-items:center;justify-content:center;margin-bottom:var(--space-md);box-shadow:0 4px 20px rgba(29,78,216,0.3)">
        <i class="fa-solid fa-gem" style="font-size:28px;color:#fff"></i>
      </div>
      <div style="font-size:22px;font-weight:700;color:var(--text-primary)">BASEBANK 現場アプリ</div>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">ログインID</label>
        <input id="login-id" type="text" class="input-field" placeholder="例：furukawa.k" oninput="loginInputChanged()">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input id="login-password" type="password" class="input-field" placeholder="パスワードを入力" oninput="loginInputChanged()" onkeypress="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" id="login-btn" onclick="doLogin()" disabled>ログイン</button>
  </div>

  <div class="screen hidden" id="screen-1">
    <div class="screen-title" id="today-date">2026年3月8日</div>
    <div class="venue-block">
      <div class="venue-header">
        <div class="venue-icon"><i class="fa-solid fa-store"></i></div>
        <div>
          <div class="venue-name">本日の担当会場</div>
          <select id="venue-select" class="input-field"></select>
        </div>
      </div>
    </div>
    <div class="register-panel">
      <div class="reg-label">現金有高を入力</div>
      <input id="cash-input" type="number" class="input-field" placeholder="500000">
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="openRegister()">業務開始</button>
  </div>

  <div class="screen hidden" id="screen-2">
    <div id="view-home" class="sub-view">
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">本日買取額</div>
          <div class="kpi-value" id="kpi-buy">¥0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">レジ残高</div>
          <div class="kpi-value" id="kpi-cash">¥0</div>
        </div>
      </div>
      <div class="section-label">進行中の案件</div>
      <div class="deal-list" id="active-deals"></div>
    </div>
    <div id="view-deals" class="sub-view hidden">
      <div class="screen-title">受付管理</div>
      <div id="deals-list-all" class="deal-list"></div>
    </div>
    <div id="view-cashier" class="sub-view hidden">
      <div class="screen-title">精算</div>
      <div id="cashier-content"></div>
    </div>
    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-item active" data-tab="home" onclick="showSubView('home')"><i class="fa-solid fa-house"></i><span>ホーム</span></button>
      <button class="bottom-nav-item" data-tab="deals" onclick="showSubView('deals')"><i class="fa-solid fa-list-check"></i><span>受付管理</span></button>
      <button class="bottom-nav-item" data-tab="cashier" onclick="showSubView('cashier')"><i class="fa-solid fa-cash-register"></i><span>精算</span></button>
    </nav>
  </div>

  <div class="screen hidden" id="screen-3">
    <div class="screen-back-row"><button class="btn btn-secondary btn-sm" onclick="navBack()">戻る</button></div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="purity-weight-wrap"></div>
    <div class="form-group"><label class="form-label">状態・コメント</label><input id="item-condition" type="text" class="input-field"></div>
    <div class="photo-area" id="photo-area">
      <div class="photo-area-icon"><i class="fa-solid fa-camera"></i></div>
      <div id="total-upload-status" class="hidden">
        <div id="total-upload-progress" style="width:0%; background:var(--accent-blue); height:4px;"></div>
      </div>
      <div class="photo-preview" id="photo-preview"></div>
    </div>
    <button class="btn btn-success btn-block btn-lg" onclick="addItemToList()">リストに追加</button>
    <div id="items-list-area" class="hidden"><div id="items-list"></div></div>
    <button class="btn btn-primary btn-block btn-lg hidden" id="send-assessment-btn" onclick="sendAssessmentRequest()">査定依頼を送信</button>
  </div>

  <div class="screen hidden" id="screen-4">
    <div class="waiting-card" id="waiting-card"><div class="waiting-spinner"></div><div>本部に照会中...</div></div>
    <div id="hq-reply" class="hidden">
      <div class="hq-reply-card">
        <div class="price-row">
          <div class="price-box"><div>下代</div><div id="reply-buy"></div></div>
          <div class="price-box"><div>上代</div><div id="reply-sell"></div></div>
        </div>
        <div id="reply-comment" class="hq-comment"></div>
      </div>
      <div class="action-btn-row">
        <button class="btn btn-danger" onclick="openNoDealModal()">不成約</button>
        <button class="btn btn-success" onclick="proceedToDeal()">成約</button>
      </div>
    </div>
  </div>

  <div class="screen hidden" id="screen-5">
    <div class="sign-area"><canvas id="sign-canvas"></canvas></div>
    <button class="btn btn-primary btn-block btn-lg" onclick="completePurchase()">買取完了</button>
  </div>

  <div class="modal-overlay hidden" id="media-modal">
    <div class="modal-sheet">
      <div class="form-group"><label class="form-label">お客様名</label><input id="customer-name-input" type="text" class="input-field"></div>
      <div class="media-grid" id="media-grid"></div>
    </div>
  </div>

  <button class="fab hidden" id="fab" onclick="openNewCustomer()"><i class="fa-solid fa-plus"></i></button>

</div>
<script src="js/mockdata.js"></script>
<script src="js/field.js"></script>
</body>
</html>
